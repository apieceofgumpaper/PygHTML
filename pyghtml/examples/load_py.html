<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PygHTML - Load .py Example</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0b0e14;
        color: rgba(255, 255, 255, 0.88);
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .wrap {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(255, 255, 255, 0.04);
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      a {
        color: #62d6ff;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        Loading <code>bounce.py</code> by URL. Source:
        <a href="./load_py.html">load_py.html</a> /
        <a href="./bounce.py">bounce.py</a>
      </header>
      <canvas id="game" data-pyghtml></canvas>
    </div>

    <script type="module">
      import { PygHTML } from "../pyghtml.js";
      PygHTML.autorun({ canvas: "#game", pyUrl: "./bounce.py" }).catch((err) => {
        console.error(err);
        alert(String(err?.message || err));
      });
    </script>
  </body>
</html>
